name: Release build

# Builds the Tauri desktop app (foxscreen) on Windows + macOS and uploads the
# installers as run artifacts. Trigger it from the Actions tab ("Run workflow")
# or by pushing a `v*` tag. Download the artifact (e.g. the Windows .msi/.exe)
# from the finished run to install and test — no GitHub Release required.

on:
  workflow_dispatch:
  push:
    tags:
      - "v*"

jobs:
  build:
    permissions:
      contents: write
    strategy:
      fail-fast: false
      matrix:
        platform: [windows-latest, macos-latest]
    runs-on: ${{ matrix.platform }}
    steps:
      - uses: actions/checkout@v4

      - name: Install bun
        uses: oven-sh/setup-bun@v2

      - name: Install Rust
        uses: dtolnay/rust-toolchain@stable

      - name: Cache Rust (src-tauri)
        uses: swatinem/rust-cache@v2
        with:
          workspaces: packages/desktop/src-tauri -> target

      # Deps are hoisted to the repo root (bun workspaces). The Tauri build runs
      # the frontend via tauri.conf `beforeBuildCommand` (bun run build:web), so
      # we only need a single root install here.
      - name: Install dependencies
        run: bun install --frozen-lockfile

      # Builds the renderer (CUTTIO_SHELL=tauri vite build) + the Rust shell and
      # bundles the installers. On Windows → NSIS .exe + .msi; on macOS → .app + .dmg.
      - name: Build Tauri app
        uses: tauri-apps/tauri-action@v0
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        with:
          projectPath: packages/desktop

      - name: Upload installers
        uses: actions/upload-artifact@v4
        with:
          name: foxscreen-${{ matrix.platform }}
          if-no-files-found: error
          path: |
            packages/desktop/src-tauri/target/release/bundle/nsis/*.exe
            packages/desktop/src-tauri/target/release/bundle/msi/*.msi
            packages/desktop/src-tauri/target/release/bundle/dmg/*.dmg
            packages/desktop/src-tauri/target/release/bundle/macos/*.app.tar.gz
