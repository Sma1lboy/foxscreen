name: Release build

# Builds the Tauri desktop app (foxscreen) on Windows + macOS.
#   - Push a `v*` tag  → publishes a GitHub Release with the installers attached.
#   - Manual dispatch  → just uploads the installers as run artifacts (no release).

on:
  workflow_dispatch:
  push:
    tags:
      - "v*"

jobs:
  build:
    permissions:
      contents: write
    strategy:
      fail-fast: false
      matrix:
        platform: [windows-latest, macos-latest]
    runs-on: ${{ matrix.platform }}
    steps:
      - uses: actions/checkout@v4

      - name: Install bun
        uses: oven-sh/setup-bun@v2

      - name: Install Rust
        uses: dtolnay/rust-toolchain@stable

      - name: Cache Rust (src-tauri)
        uses: swatinem/rust-cache@v2
        with:
          workspaces: packages/desktop/src-tauri -> target

      # Deps are hoisted to the repo root (bun workspaces). The Tauri build runs
      # the frontend via tauri.conf `beforeBuildCommand` (bun run build:web), so
      # we only need a single root install here.
      - name: Install dependencies
        run: bun install --frozen-lockfile

      # Builds the renderer (CUTTIO_SHELL=tauri vite build) + the Rust shell and
      # bundles the installers. On Windows → NSIS .exe + .msi; on macOS → .app + .dmg.
      - name: Build Tauri app
        uses: tauri-apps/tauri-action@v0
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        with:
          projectPath: packages/desktop
          # On a tag push, create/append to a GitHub Release and attach the
          # installers as assets. Empty on manual dispatch → build only, no release.
          tagName: ${{ github.ref_type == 'tag' && github.ref_name || '' }}
          releaseName: ${{ github.ref_type == 'tag' && format('foxscreen {0}', github.ref_name) || '' }}
          releaseBody: |
            Desktop installers for foxscreen — download the file for your platform below.
            - **Windows**: `.msi` or the NSIS `.exe`
            - **macOS**: `.dmg` (Apple Silicon)

            The editor path works (import a video → timeline / clips / tracks / multi-select / undo / transitions → export). Screen recording is deferred.
          releaseDraft: false
          prerelease: false

      - name: Upload installers
        if: github.ref_type != 'tag'
        uses: actions/upload-artifact@v4
        with:
          name: foxscreen-${{ matrix.platform }}
          if-no-files-found: error
          path: |
            packages/desktop/src-tauri/target/release/bundle/nsis/*.exe
            packages/desktop/src-tauri/target/release/bundle/msi/*.msi
            packages/desktop/src-tauri/target/release/bundle/dmg/*.dmg
            packages/desktop/src-tauri/target/release/bundle/macos/*.app.tar.gz
