name: Release macOS

# Trigger:
#   - Pushing a tag like `v1.0.0` cuts a release with that version.
#   - Manual `workflow_dispatch` lets you specify the version (and the
#     workflow will create+push the tag itself).
#
# What this does:
#   1. Decode the Developer ID .p12 + ASC API key + Sparkle EdDSA private
#      key from GitHub Secrets into a per-job ephemeral keychain.
#   2. Run scripts/release-macos.sh — same script the maintainer would run
#      locally — which produces a signed, notarized DMG, an EdDSA-signed
#      appcast.xml, and uploads both as GitHub Release assets.
#
# Required secrets (Settings → Secrets and variables → Actions):
#   DEVELOPER_ID_APPLICATION    String, e.g.
#                                 "Developer ID Application: Foo (TEAMID)"
#   DEVELOPER_ID_P12_BASE64     base64 of the .p12 export of the cert
#   DEVELOPER_ID_P12_PASSWORD   Password used when exporting the .p12
#                                 (leave empty if exported without one)
#   ASC_API_KEY_ID              App Store Connect API key ID
#   ASC_API_KEY_ISSUER_ID       App Store Connect issuer UUID
#   ASC_API_KEY_P8_BASE64       base64 of the AuthKey_*.p8 file
#   SPARKLE_ED_PRIVATE_KEY      44-char base64 raw EdDSA private key
#   SPARKLE_PUBLIC_ED_KEY       44-char base64 raw EdDSA public key
#
# Notes:
#   - Runs on macos-14 (Apple Silicon). Cutti is arm64-only.
#   - Notarization legitimately takes 5–15 minutes per artifact, so the
#     job timeout is set to 90 minutes to give two notarizations + slack.
#   - The keychain is destroyed at the end of the job.
#   - .github/workflows is touched intentionally per AGENTS.md B3.

on:
  push:
    tags:
      - 'v*'
  workflow_dispatch:
    inputs:
      version:
        description: 'Version to release (e.g. 1.0.0). Will create tag vX.Y.Z.'
        required: true

permissions:
  contents: write   # needed to create the release and push the tag

concurrency:
  # Two simultaneous releases would race on the tag/feed and corrupt
  # the appcast.xml asset. Serialize them.
  group: release-macos
  cancel-in-progress: false

jobs:
  release:
    name: Build, sign, notarize, publish
    runs-on: macos-26
    timeout-minutes: 90

    steps:
      - name: Set up environment
        run: |
          # Job-level env: cannot reference ${{ runner.temp }}, that context
          # only exists at step level. Export via $GITHUB_ENV so all later
          # steps see $KEYCHAIN_PATH.
          echo "KEYCHAIN_PATH=$RUNNER_TEMP/cutti-build.keychain-db" >> "$GITHUB_ENV"

      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 0   # full history needed for `git rev-list --count HEAD`

      - name: Resolve version + tag
        id: ver
        run: |
          set -euo pipefail
          if [[ "${{ github.event_name }}" == "workflow_dispatch" ]]; then
            VERSION="${{ inputs.version }}"
          else
            VERSION="${GITHUB_REF_NAME#v}"
          fi
          [[ -n "$VERSION" ]] || { echo "Empty version" >&2; exit 1; }
          echo "version=$VERSION" >> "$GITHUB_OUTPUT"
          echo "tag=v$VERSION"   >> "$GITHUB_OUTPUT"
          echo "Resolved version=$VERSION  tag=v$VERSION"

      - name: Select Xcode
        run: |
          set -euo pipefail
          # Project requires Swift 6.3+ (the strict-concurrency diagnostics
          # in newer Xcode are looser than 6.0/6.1). Xcode 26 ships Swift
          # 6.3, so pick the highest Xcode_26.* available on the runner.
          XCODE_PATH=$(ls -d /Applications/Xcode_26*.app 2>/dev/null | sort -V | tail -1)
          if [[ -z "$XCODE_PATH" ]]; then
            echo "No Xcode 26+ found on this runner. Available:" >&2
            ls /Applications | grep -i xcode >&2
            exit 1
          fi
          sudo xcode-select -s "$XCODE_PATH"
          xcodebuild -version
          swift --version

      - name: Create build keychain + import Developer ID cert
        env:
          P12_BASE64:   ${{ secrets.DEVELOPER_ID_P12_BASE64 }}
          P12_PASSWORD: ${{ secrets.DEVELOPER_ID_P12_PASSWORD }}
        run: |
          set -euo pipefail
          # Ephemeral random password for the temp keychain. Never logged.
          KC_PASS=$(openssl rand -base64 32)
          echo "::add-mask::$KC_PASS"

          security create-keychain   -p "$KC_PASS" "$KEYCHAIN_PATH"
          security set-keychain-settings -lut 21600 "$KEYCHAIN_PATH"
          security unlock-keychain   -p "$KC_PASS" "$KEYCHAIN_PATH"

          # Make our build keychain the default one so generate_keys (Sparkle)
          # writes into it, and prepend it to the search list so codesign
          # and sign_update find the items.
          security default-keychain -s "$KEYCHAIN_PATH"
          security list-keychains -d user -s "$KEYCHAIN_PATH" \
            $(security list-keychains -d user | tr -d '"')

          # Decode + import .p12
          P12=$RUNNER_TEMP/cert.p12
          printf '%s' "$P12_BASE64" | base64 -d > "$P12"
          security import "$P12" \
            -P "$P12_PASSWORD" \
            -k "$KEYCHAIN_PATH" \
            -T /usr/bin/codesign \
            -T /usr/bin/security
          rm "$P12"

          # Allow codesign to use the private key without prompting.
          security set-key-partition-list \
            -S apple-tool:,apple: \
            -s -k "$KC_PASS" "$KEYCHAIN_PATH"

          security find-identity -p codesigning -v "$KEYCHAIN_PATH"

      - name: Store notarization credentials in build keychain
        env:
          ASC_KEY_ID:    ${{ secrets.ASC_API_KEY_ID }}
          ASC_ISSUER_ID: ${{ secrets.ASC_API_KEY_ISSUER_ID }}
          ASC_KEY_P8:    ${{ secrets.ASC_API_KEY_P8_BASE64 }}
        run: |
          set -euo pipefail
          P8=$RUNNER_TEMP/AuthKey.p8
          printf '%s' "$ASC_KEY_P8" | base64 -d > "$P8"
          xcrun notarytool store-credentials cutti-notary \
            --keychain "$KEYCHAIN_PATH" \
            --key      "$P8" \
            --key-id   "$ASC_KEY_ID" \
            --issuer   "$ASC_ISSUER_ID"
          rm "$P8"

      - name: Install Sparkle CLI tools
        run: |
          set -euo pipefail
          brew install --cask sparkle
          # Find the versioned bin dir and prepend to PATH for later steps.
          SPARKLE_BIN_DIR=$(dirname "$(find /opt/homebrew/Caskroom/sparkle -path '*/bin/sign_update' | head -1)")
          [[ -n "$SPARKLE_BIN_DIR" ]] || { echo "sign_update not found" >&2; exit 1; }
          echo "$SPARKLE_BIN_DIR" >> "$GITHUB_PATH"
          # Verify
          "$SPARKLE_BIN_DIR/sign_update" --help >/dev/null
          "$SPARKLE_BIN_DIR/generate_keys" --help >/dev/null

      - name: Stage Sparkle EdDSA private key as file
        env:
          SPARKLE_ED_PRIVATE_KEY: ${{ secrets.SPARKLE_ED_PRIVATE_KEY }}
        run: |
          set -euo pipefail
          # sign_update on a fresh CI keychain hangs trying to unlock the
          # keychain interactively. Pass the key via -f <file> instead.
          # The file is removed by the cleanup step at the end of the job.
          KEY_FILE="$RUNNER_TEMP/sparkle-private.txt"
          printf '%s' "$SPARKLE_ED_PRIVATE_KEY" > "$KEY_FILE"
          chmod 600 "$KEY_FILE"
          echo "SPARKLE_ED_PRIVATE_KEY_FILE=$KEY_FILE" >> "$GITHUB_ENV"

      - name: Download vendor xcframeworks
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          set -euo pipefail
          # Package.swift uses local-path binaryTargets while the repo is
          # private; the actual xcframework zips are uploaded as assets on
          # the `vendor-sherpa-…` release. Pull and unpack them here so
          # `swift build` can find them.
          VENDOR_DIR="macos/CuttiMac/Vendor"
          VENDOR_TAG="vendor-sherpa-v1.12.39-ort-1.24.4"
          mkdir -p "$VENDOR_DIR"
          cd "$VENDOR_DIR"
          gh release download "$VENDOR_TAG" \
            --repo "${GITHUB_REPOSITORY}" \
            --pattern '*.xcframework.zip' \
            --clobber
          unzip -q -o sherpa-onnx.xcframework.zip
          unzip -q -o onnxruntime.xcframework.zip
          rm -f *.zip
          ls -la

      - name: Run release script
        env:
          DEVELOPER_ID_APPLICATION:    ${{ secrets.DEVELOPER_ID_APPLICATION }}
          NOTARYTOOL_KEYCHAIN_PROFILE: cutti-notary
          NOTARYTOOL_KEYCHAIN:         ${{ env.KEYCHAIN_PATH }}
          SPARKLE_PUBLIC_ED_KEY:       ${{ secrets.SPARKLE_PUBLIC_ED_KEY }}
          GH_TOKEN:                    ${{ secrets.GITHUB_TOKEN }}
        run: |
          set -euo pipefail
          ./scripts/release-macos.sh --version "${{ steps.ver.outputs.version }}"

      - name: Cleanup keychain
        if: always()
        run: |
          security delete-keychain "$KEYCHAIN_PATH" 2>/dev/null || true
          rm -f "${SPARKLE_ED_PRIVATE_KEY_FILE:-}" 2>/dev/null || true
