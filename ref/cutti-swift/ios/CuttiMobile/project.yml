name: CuttiMobile
options:
  bundleIdPrefix: app.cutti
  deploymentTarget:
    iOS: "17.0"
  createIntermediateGroups: true
  developmentLanguage: zh-Hans

settings:
  base:
    SWIFT_VERSION: "6.0"
    IPHONEOS_DEPLOYMENT_TARGET: "17.0"
    TARGETED_DEVICE_FAMILY: "1,2"        # 1 = iPhone, 2 = iPad → Universal App
    SUPPORTS_MACCATALYST: NO
    ENABLE_USER_SCRIPT_SANDBOXING: YES
    SWIFT_STRICT_CONCURRENCY: complete

packages:
  CuttiKit:
    path: ../../shared/CuttiKit

targets:
  CuttiMobile:
    type: application
    platform: iOS
    sources:
      - path: Sources
      - path: Resources
        optional: true
      # Shared with macOS app: cloud relay / StoreKit / keychain. Pure
      # Foundation-level code; including by path (not a package) keeps
      # all types internal to the iOS app target.
      - path: ../../macos/CuttiMac/Sources/CuttiMac/Core/Cloud/RelayClient.swift
      - path: ../../macos/CuttiMac/Sources/CuttiMac/Core/Cloud/RelaySession.swift
      - path: ../../macos/CuttiMac/Sources/CuttiMac/Core/Cloud/KeychainStore.swift
      - path: ../../macos/CuttiMac/Sources/CuttiMac/Core/Cloud/SubscriptionManager.swift
      - path: ../../macos/CuttiMac/Sources/CuttiMac/Core/Cloud/RelayCreditsNotification.swift
      # AIProviderPreference / CustomAIConfiguration data types. iOS is
      # subscription-only (no BYOK UI, no .custom code paths), but
      # `OpenAIConfiguration.provider: AIProviderPreference` is part of
      # the shared chat-completion config struct, so the enum has to be
      # available on both platforms. The actual BYOK call paths in
      # OpenAIClient / ImageGenerationService are gated behind
      # `#if os(macOS)` so iOS can never construct or dispatch a
      # `.custom` configuration at runtime.
      - path: ../../macos/CuttiMac/Sources/CuttiMac/Core/Cloud/AIProvider.swift
      - path: ../../macos/CuttiMac/Sources/CuttiMac/Core/OpenAIClient.swift
      - path: ../../macos/CuttiMac/Sources/CuttiMac/Core/LLMEditorService.swift
      - path: ../../macos/CuttiMac/Sources/CuttiMac/Core/ImageGenerationService.swift
      # Local media analysis services — pure AVFoundation + Vision,
      # iOS-compatible. Shared so iOS can orchestrate the same
      # transcribe + audio-silence + (optional) scene pipeline the
      # macOS FullAnalysisPipeline uses for 一键首剪.
      - path: ../../macos/CuttiMac/Sources/CuttiMac/Media/AudioQualityService.swift
    dependencies:
      - package: CuttiKit
        product: CuttiKit
    info:
      path: SupportingFiles/Info.plist
      properties:
        CFBundleDisplayName: Cutti
        CFBundleLocalizations:
          - zh-Hans
          - en
        UILaunchScreen:
          UIColorName: ""
        UISupportedInterfaceOrientations:          # iPhone: portrait + landscape
          - UIInterfaceOrientationPortrait
          - UIInterfaceOrientationLandscapeLeft
          - UIInterfaceOrientationLandscapeRight
        "UISupportedInterfaceOrientations~ipad":   # iPad: all 4 orientations
          - UIInterfaceOrientationPortrait
          - UIInterfaceOrientationPortraitUpsideDown
          - UIInterfaceOrientationLandscapeLeft
          - UIInterfaceOrientationLandscapeRight
        NSPhotoLibraryUsageDescription: Cutti needs access to your photo library to import videos for editing.
        NSPhotoLibraryAddUsageDescription: Cutti saves your exported videos to your photo library.
        NSMicrophoneUsageDescription: Cutti uses the microphone when you record voiceover clips.
        NSSpeechRecognitionUsageDescription: Cutti transcribes your clips on-device to power AI editing.
        NSCameraUsageDescription: Cutti uses the camera when you record clips directly into the editor.
        ITSAppUsesNonExemptEncryption: false
    settings:
      base:
        PRODUCT_BUNDLE_IDENTIFIER: app.cutti.ios
        GENERATE_INFOPLIST_FILE: NO
        ASSETCATALOG_COMPILER_APPICON_NAME: AppIcon
        CODE_SIGN_STYLE: Automatic
        # Set to your own Apple Developer Team ID before building for a real
        # device or App Store submission. Leave empty for Simulator-only builds.
        DEVELOPMENT_TEAM: ""
