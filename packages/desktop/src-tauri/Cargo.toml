[package]
name = "foxscreen"
version = "0.1.0"
description = "foxscreen — AI video editor (Tauri shell; inherits from OpenScreen)"
edition = "2021"
rust-version = "1.77"

[lib]
name = "foxscreen_lib"
crate-type = ["staticlib", "cdylib", "rlib"]

[build-dependencies]
tauri-build = { version = "2", features = [] }

[dependencies]
tauri = { version = "2", features = ["protocol-asset"] }
tauri-plugin-dialog = "2"
tauri-plugin-fs = "2"
tauri-plugin-os = "2"
tauri-plugin-shell = "2"
portable-pty = "0.8"
serde = { version = "1", features = ["derive"] }
serde_json = "1"
